# One row per (output-class, arch) the flake actually targets, per the
# nix-garnix-ci skill's wildcard discipline. Scoped to the host arch
# (aarch64-darwin) only — opt other arches back in when a downstream
# actually ships there.
#
# No `builds.branch` restriction: every push (including PR branches) gets
# checked. The PR-required ruleset relies on per-PR check feedback.
builds:
  include:
    - "packages.aarch64-darwin.*"
    - "checks.aarch64-darwin.*"
    - "devShells.aarch64-darwin.default"
